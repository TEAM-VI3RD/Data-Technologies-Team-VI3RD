services:

  # --------------------------------------------------------------------------
  # PostgreSQL database
  # --------------------------------------------------------------------------
  db:
    image: postgres:18-alpine
    container_name: webshop-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
      # SQL files are executed once on first container start (when data volume is empty).
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_add_password_hash.sql:/docker-entrypoint-initdb.d/002_add_password_hash.sql
      - ./migrations/003_add_user_roles.sql:/docker-entrypoint-initdb.d/003_add_user_roles.sql
      - ./migrations/004_cart.sql:/docker-entrypoint-initdb.d/004_cart.sql
      - ./migrations/005_align_to_new_erd.sql:/docker-entrypoint-initdb.d/005_align_to_new_erd.sql
      - ./migrations/006_seed_products.sql:/docker-entrypoint-initdb.d/006_seed_products.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Go backend
  # --------------------------------------------------------------------------
  backend:
    build: .
    container_name: webshop-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_HOST: ${SERVER_HOST:-localhost:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
